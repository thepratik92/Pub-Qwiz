            { id: 'r1-c4-q3', points: 30, question: "The 1963 WWII film where Allied prisoners lead a massive breakout from a camp.", answer: "The Great Escape" },

            { id: 'r2-c2-q4', points: 40, question: "Founded in Texas, this convenience store chain was named for its unprecedented original operating hours from 7:00 AM to 11:00 PM, also found in Japan", answer: "7-Eleven" },
            { id: 'r2-c2-q5', points: 50, question: "Founded in Zaandam in 1887, this blue-branded giant is the largest supermarket chain in the Netherlands and namesake of the Ahold group", answer: "Albert Heijn" }
          ]
        },

            { id: 'r2-c3-q1', points: 10, question: "Rio Grande: Mexico and...", answer: "USA" },

          ]
        },
        {

          questions: [
            { id: 'r2-c4-q1', points: 10, question: "SALID LOVER.", answer: "EL SALVADOR" },
            { id: 'r2-c4-q2', points: 20, question: "PRISON AGE.", answer: "SINGAPORE" },
            { id: 'r2-c4-q3', points: 30, question: "EARLY ONE.", answer: "SIERRA LEONE" },
            { id: 'r2-c4-q4', points: 40, question: "MISTAKEN TURN.", answer: "TURKMENISTAN" },

          ]
        },
        {
          name: "Capitals of the World",
          questions: [
            { id: 'r2-c5-q1', points: 10, question: "The \"City of Light,\" capital of France.", answer: "Paris" },
            { id: 'r2-c5-q2', points: 20, question: "The \"City of the Seven Hills,\" capital of Italy.", answer: "Rome" },
            { id: 'r2-c5-q3', points: 30, question: "The world's northernmost capital city in Iceland.", answer: "Reykjavik" },
            { id: 'r2-c5-q4', points: 40, question: "The planned capital city of Australia.", answer: "Canberra" },
            { id: 'r2-c5-q5', points: 50, question: "The high-altitude capital of Kenya.", answer: "Nairobi" }
          ]
        }

    function App() {
      const [quizState, setQuizState] = useState(quizData);
      const [activeTab, setActiveTab] = useState('board');
      const [currentRound, setCurrentRound] = useState(1);
      const [players, setPlayers] = useState([
        { id: 1, name: 'Team 1', score: 0 },
        { id: 2, name: 'Team 2', score: 0 },
        { id: 3, name: 'Team 3', score: 0 },
        { id: 4, name: 'Team 4', score: 0 }
      ]);
      const [asked, setAsked] = useState(new Set());
      const [activeQuestion, setActiveQuestion] = useState(null);
      const [questionStep, setQuestionStep] = useState('question');
      const [customPoints, setCustomPoints] = useState({ 1: '', 2: '', 3: '', 4: '' });
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [alertMessage, setAlertMessage] = useState(null);
      const [isClosing, setIsClosing] = useState(false);
      
      // Floating Text State
      const [popups, setPopups] = useState([]);

      const toggleFullScreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.log(`Error attempting to enable fullscreen: ${err.message}`);
          });
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
        }
      };

      const [editRound, setEditRound] = useState(1);
      const [editCatIndex, setEditCatIndex] = useState(0);
      const [editQIndex, setEditQIndex] = useState(0);
      const [editForm, setEditForm] = useState({ question: '', questionImage: '', answer: '', answerImage: '' });

      useEffect(() => {
        const q = quizState[editRound][editCatIndex].questions[editQIndex];
        setEditForm({
          question: q.question,
          questionImage: q.questionImage || '',
          answer: q.answer,
          answerImage: q.answerImage || ''
        });
      }, [quizState, editRound, editCatIndex, editQIndex]);

      const saveQuestionEdit = () => {
        setQuizState(prevState => {
          const newState = JSON.parse(JSON.stringify(prevState));
          const q = newState[editRound][editCatIndex].questions[editQIndex];
          q.question = editForm.question;
          q.questionImage = editForm.questionImage;
          q.answer = editForm.answer;
          q.answerImage = editForm.answerImage;
          return newState;
        });
        const btn = document.getElementById('save-btn');
        if(btn) { btn.innerText = "Saved!"; setTimeout(() => btn.innerText = "Save Updates to Board", 1500); }
      };

      const handleImageUpload = (e, field) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 1920;
              const MAX_HEIGHT = 1080;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              setEditForm(prev => ({ ...prev, [field]: canvas.toDataURL('image/jpeg', 0.8) }));
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      };

      const exportConfig = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(quizState));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "qwiz_config.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const importConfig = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedState = JSON.parse(event.target.result);
            if (importedState[1] && importedState[2]) {
              setQuizState(importedState);
              setAlertMessage("Qwiz data imported successfully!");
            } else setAlertMessage("Invalid configuration file format.");
          } catch (err) { setAlertMessage("Error parsing the configuration file."); }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const openQuestion = (q) => {
        setActiveQuestion(q);
        setQuestionStep('question');
      };

      const closeQuestion = () => {
        if (activeQuestion) {
          setAsked(prevAsked => new Set(prevAsked).add(activeQuestion.id));
        }
        setActiveQuestion(null);
        setQuestionStep('question');
        setIsClosing(false);
      };

      // Spawns a floating text animation for a specific player
      const triggerPopup = (playerId, amount) => {
        const id = Date.now() + Math.random();
        setPopups(prev => [...prev, { id, playerId, amount }]);
        setTimeout(() => {
          setPopups(prev => prev.filter(p => p.id !== id));
        }, 1000); // Remove after animation
      };

      const updateScore = (id, amount) => {
        setPlayers(prev => prev.map(p => p.id === id ? { ...p, score: p.score + amount } : p));
        triggerPopup(id, amount);
      };

      const handleTeamAnswer = (playerId, isCorrect) => {
        if (activeQuestion && !isClosing) {
          const pointChange = isCorrect ? activeQuestion.points : -activeQuestion.points;
          updateScore(playerId, pointChange);
          
          if (isCorrect) {
            setIsClosing(true); // Lock the buttons
            setTimeout(() => {
              closeQuestion();
            }, 800); // Wait for the visual +points to float up before closing
          }
        }
      };

      const updatePlayerName = (id, newName) => setPlayers(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));

      const handleCustomPointUpdate = (id, isAdd) => {
        const pts = parseInt(customPoints[id]) || 0;
        if (pts > 0) {
          updateScore(id, isAdd ? pts : -pts);
          setCustomPoints(prev => ({ ...prev, [id]: '' }));
        }
      };

      const confirmReset = () => {
        setAsked(new Set());
        setPlayers(prev => prev.map(p => ({ ...p, score: 0 })));
        setCurrentRound(1);
        setActiveTab('board');
        setShowResetConfirm(false);
      };

      const renderBoard = () => (
        <div className="w-full max-w-7xl mx-auto p-8 relative z-10">
          <div className="flex justify-between items-center mb-8">
            <h2 className="text-4xl font-black text-fuchsia-500 uppercase tracking-widest drop-shadow-[0_0_15px_rgba(217,70,239,0.5)] flex items-center gap-3">
              Round {currentRound}
            </h2>
            <div className="flex gap-4">
              <button onClick={() => setCurrentRound(1)} className={`px-5 py-2.5 rounded-lg font-black transition-all border-2 ${currentRound === 1 ? 'bg-cyan-500 text-slate-950 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.6)]' : 'bg-slate-900 text-slate-400 border-slate-700 hover:text-cyan-400 hover:border-cyan-800'}`}>ROUND 1</button>
              <button onClick={() => setCurrentRound(2)} className={`px-5 py-2.5 rounded-lg font-black transition-all border-2 ${currentRound === 2 ? 'bg-cyan-500 text-slate-950 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.6)]' : 'bg-slate-900 text-slate-400 border-slate-700 hover:text-cyan-400 hover:border-cyan-800'}`}>ROUND 2</button>
            </div>
          </div>

          <div className="grid grid-cols-5 gap-4 md:gap-6">
            {quizState[currentRound].map((cat, i) => (
              <div key={i} className="flex flex-col gap-3">
                <div className="bg-fuchsia-950/80 border border-fuchsia-500 text-fuchsia-200 font-bold p-4 text-center rounded-xl shadow-[0_0_10px_rgba(217,70,239,0.2)] h-28 flex items-center justify-center uppercase tracking-wider text-sm lg:text-base leading-tight backdrop-blur-sm">{cat.name}</div>
                {cat.questions.map(q => {
                  const isAsked = asked.has(q.id);
                  return (
                    <button key={q.id} disabled={isAsked} onClick={() => openQuestion(q)} className={`h-24 text-4xl font-black rounded-xl transition-all duration-300 transform ${isAsked ? 'bg-slate-900/30 border border-dashed border-slate-700/50 text-slate-800 cursor-default' : 'bg-slate-900 border-b-4 border-cyan-600 text-cyan-400 hover:bg-slate-800 hover:text-cyan-300 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] active:translate-y-0 active:border-b-0 mt-1 mb-[-1px]'}`}>{isAsked ? '' : q.points}</button>
                  )
                })}
              </div>
            ))}
          </div>
        </div>
      );

      const renderAdmin = () => (
        <div className="w-full max-w-5xl mx-auto p-8 relative z-10">
          <div className="bg-slate-900/90 backdrop-blur-md rounded-2xl p-8 shadow-2xl border border-slate-700">
            <h2 className="text-3xl font-black text-cyan-400 mb-8 flex items-center gap-3"><Settings className="text-fuchsia-500" size={32} />Host Dashboard</h2>
            <p className="text-slate-400 mb-8">Update team names and manage points secretly here.</p>

            <div className="space-y-6">
              {players.map(p => {
                const theme = TEAM_THEMES[p.id];
                return (
                  <div key={p.id} className={`relative p-6 rounded-xl flex flex-wrap items-center justify-between gap-4 border ${theme.bg} ${theme.border} bg-slate-950/50`}>
                    <div className="flex items-center gap-4 flex-grow">
                      <div className={`w-4 h-12 rounded-full shadow-[0_0_10px_rgba(var(--tw-color-${theme.color}-500),0.5)]`} style={{ backgroundColor: theme.color === 'cyan' ? '#22d3ee' : theme.color === 'fuchsia' ? '#d946ef' : theme.color === 'emerald' ? '#10b981' : '#f59e0b' }}></div>
                      <input value={p.name} onChange={(e) => updatePlayerName(p.id, e.target.value)} className={`bg-slate-900 ${theme.text} px-4 py-2 rounded-lg border border-slate-700 focus:border-white focus:outline-none text-xl font-bold w-64 shadow-inner`} />
                    </div>
                    
                    <div className={`text-4xl font-black ${theme.text} w-32 text-center drop-shadow-[0_0_8px_rgba(0,0,0,0.4)] relative`}>
                      {p.score}
                      {/* Floating Text Container for Admin Panel */}
                      <div className="absolute top-0 right-0 left-0 flex justify-center pointer-events-none z-50">
                        {popups.filter(pop => pop.playerId === p.id).map(pop => (
                          <div key={pop.id} className={`absolute animate-float-up text-3xl font-black drop-shadow-xl ${pop.amount > 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                            {pop.amount > 0 ? '+' : ''}{pop.amount}
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex items-center gap-2">
                      <button onClick={() => updateScore(p.id, 10)} className="px-3 py-2 bg-white/5 text-slate-300 hover:bg-white/10 rounded-lg font-bold transition-colors">+10</button>
                      <button onClick={() => updateScore(p.id, 20)} className="px-3 py-2 bg-white/5 text-slate-300 hover:bg-white/10 rounded-lg font-bold transition-colors">+20</button>
                      <button onClick={() => updateScore(p.id, -10)} className="px-3 py-2 bg-white/5 text-slate-300 hover:bg-white/10 rounded-lg font-bold transition-colors">-10</button>
                      <div className="h-8 w-px bg-slate-700 mx-2"></div>
                      <input type="number" value={customPoints[p.id]} onChange={(e) => setCustomPoints({...customPoints, [p.id]: e.target.value})} placeholder="Pts" className="bg-slate-900 text-white px-3 py-2 rounded-lg border border-slate-700 w-20 text-center" />
                      <button onClick={() => handleCustomPointUpdate(p.id, true)} className={`px-3 py-2 bg-slate-700 text-white hover:bg-slate-600 rounded-lg font-bold`}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="mt-12 pt-8 border-t border-slate-700">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <div><h3 className="text-2xl font-bold text-cyan-400 mb-2">Qwiz Content Editor</h3><p className="text-slate-400">Edit text or upload images directly.</p></div>
                <div className="flex gap-3">
                  <label className="cursor-pointer px-4 py-2 bg-fuchsia-900/40 hover:bg-fuchsia-900/60 border border-fuchsia-500/50 text-fuchsia-300 font-bold rounded-lg flex items-center transition-colors">Import Config<input type="file" accept=".json" className="hidden" onChange={importConfig} /></label>
                  <button onClick={exportConfig} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-colors">Export Config</button>
                </div>
              </div>
              <div className="bg-slate-950 p-6 rounded-xl border border-slate-800 space-y-4">
                <div className="flex gap-4 mb-4">
                  <select className="bg-slate-900 text-cyan-100 p-2 rounded-lg border border-slate-700" value={editRound} onChange={e => setEditRound(Number(e.target.value))}>
                    <option value={1}>Round 1</option><option value={2}>Round 2</option>
                  </select>
                  <select className="bg-slate-900 text-cyan-100 p-2 rounded-lg border border-slate-700" value={editCatIndex} onChange={e => setEditCatIndex(Number(e.target.value))}>
                    {quizState[editRound].map((cat, i) => <option key={i} value={i}>{cat.name}</option>)}
                  </select>
                  <select className="bg-slate-900 text-cyan-100 p-2 rounded-lg border border-slate-700" value={editQIndex} onChange={e => setEditQIndex(Number(e.target.value))}>
                    {quizState[editRound][editCatIndex].questions.map((q, i) => <option key={i} value={i}>{q.points} Points</option>)}
                  </select>
                </div>
                <div className="space-y-4">
                  <input className="w-full bg-slate-900 text-cyan-100 p-3 rounded-lg border border-slate-700" value={quizState[editRound][editCatIndex].name} onChange={e => { const newState = {...quizState}; newState[editRound][editCatIndex].name = e.target.value; setQuizState(newState); }} />
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4"><textarea className="w-full bg-slate-900 text-cyan-100 p-3 rounded-lg border border-slate-700 h-32" value={editForm.question} onChange={e => setEditForm({...editForm, question: e.target.value})} /><label className="cursor-pointer bg-slate-800 p-3 rounded-lg border border-slate-700 block text-center font-bold">Upload Question Image<input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, 'questionImage')} /></label></div>
                    <div className="space-y-4"><textarea className="w-full bg-slate-900 text-fuchsia-100 p-3 rounded-lg border border-slate-700 h-32" value={editForm.answer} onChange={e => setEditForm({...editForm, answer: e.target.value})} /><label className="cursor-pointer bg-slate-800 p-3 rounded-lg border border-slate-700 block text-center font-bold">Upload Answer Image<input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, 'answerImage')} /></label></div>
                  </div>
                  <button id="save-btn" onClick={saveQuestionEdit} className="px-6 py-3 bg-cyan-600 text-slate-950 font-black rounded-lg w-full">Save Updates to Board</button>
                </div>
              </div>
            </div>
            <div className="mt-12 pt-8 border-t border-slate-700 text-center"><button onClick={() => setShowResetConfirm(true)} className="px-6 py-3 bg-rose-950/50 text-rose-500 hover:bg-rose-900 border border-rose-800 rounded-lg font-bold">Reset Entire Qwiz</button></div>
          </div>
        </div>
      );

      const renderLeaderboard = () => {
        const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
        return (
          <div className="w-full max-w-5xl mx-auto p-8 flex flex-col items-center relative z-10">
            <h2 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-500 mb-16 flex items-center gap-4 drop-shadow-[0_0_20px_rgba(251,191,36,0.5)]"><Trophy className="text-yellow-400" size={56} /> LEADERBOARD <Trophy className="text-yellow-400" size={56} /></h2>
            <div className="w-full space-y-6">
              {sortedPlayers.map((p, index) => {
                const theme = TEAM_THEMES[p.id];
                return (
                  <div key={p.id} className={`flex items-center justify-between p-6 rounded-2xl border bg-slate-900/60 ${theme.border} transform transition-all duration-500 ${index === 0 ? 'scale-105 shadow-[0_0_30px_rgba(245,158,11,0.3)]' : ''}`}>
                    <div className="flex items-center gap-6"><div className={`text-4xl font-black ${index === 0 ? 'text-amber-400' : index === 1 ? 'text-slate-300' : 'text-slate-500'}`}>#{index + 1}</div><div className={`text-3xl font-bold ${theme.text}`}>{p.name}</div></div>
                    <div className={`text-5xl font-black ${theme.text}`}>{p.score} <span className="text-2xl text-slate-500 font-bold">pts</span></div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div>
          <div className="fixed inset-0 flex items-center justify-center pointer-events-none z-0 overflow-hidden"><PartyPopper className="text-white opacity-[0.02] w-[90vw] h-[90vw] -rotate-12" /></div>
          <header className="bg-slate-950/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
              <h1 className="text-3xl font-black flex items-center gap-2"><span className="text-cyan-400">QWIZ</span> <span className="text-fuchsia-500">PARTY</span> 🎂</h1>
              <div className="flex gap-2 p-1 bg-slate-900 rounded-xl border border-slate-800">
                <button onClick={toggleFullScreen} className="px-3 py-2.5 rounded-lg text-slate-400 hover:text-cyan-400"><Maximize size={18} /></button>
                <button onClick={() => setActiveTab('board')} className={`px-6 py-2.5 rounded-lg font-bold text-sm ${activeTab === 'board' ? 'bg-cyan-500 text-slate-950 shadow-lg' : 'text-slate-400'}`}><LayoutGrid size={18} className="inline mr-2" /> Board</button>
                <button onClick={() => setActiveTab('admin')} className={`px-6 py-2.5 rounded-lg font-bold text-sm ${activeTab === 'admin' ? 'bg-fuchsia-500 text-white' : 'text-slate-400'}`}><Settings size={18} className="inline mr-2" /> Admin</button>
                <button onClick={() => setActiveTab('leaderboard')} className={`px-6 py-2.5 rounded-lg font-bold text-sm ${activeTab === 'leaderboard' ? 'bg-amber-500 text-slate-950' : 'text-slate-400'}`}><Trophy size={18} className="inline mr-2" /> Scores</button>
              </div>
            </div>
          </header>

          <main className="min-h-[calc(100vh-80px)] flex flex-col justify-center py-8">
            {activeTab === 'board' && renderBoard()}
            {activeTab === 'admin' && renderAdmin()}
            {activeTab === 'leaderboard' && renderLeaderboard()}
          </main>

          {activeQuestion && (
            <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-50 flex flex-col">
              <div className="flex justify-between items-center p-6 border-b border-slate-800 bg-slate-900/50">
                 <div className="text-xl font-black text-slate-950 bg-cyan-400 px-5 py-2 rounded-lg">{activeQuestion.points} POINTS</div>
                 <button onClick={closeQuestion} className="bg-slate-800 text-slate-300 p-2 rounded-lg hover:bg-rose-500 hover:text-white transition-colors"><XIcon size={24} /></button>
              </div>

              <div className="flex-grow flex flex-col items-center justify-start p-12 overflow-y-auto w-full relative z-10">
                <div className="my-auto flex flex-col items-center w-full gap-12">
                  <div className={`transition-all duration-700 max-w-6xl w-full text-center flex flex-col items-center gap-8 ${(questionStep === 'answer' || questionStep === 'scoring') ? 'translate-y-[-10vh]' : ''}`}>
                    {activeQuestion.questionImage && <img src={activeQuestion.questionImage} alt="Q" onError={(e) => e.target.style.display='none'} className="max-h-[40vh] object-contain rounded-2xl shadow-2xl border-2 border-slate-800" />}
                    <h2 className="text-4xl md:text-5xl lg:text-7xl font-black text-white leading-tight drop-shadow-2xl">{activeQuestion.question}</h2>
                  </div>

                  {(questionStep === 'answer' || questionStep === 'scoring') && (
                    <div className="max-w-5xl w-full text-center bg-slate-900/90 p-10 rounded-3xl border border-fuchsia-500 shadow-2xl flex flex-col items-center gap-8 animate-in fade-in duration-700">
                      <h3 className="text-xl text-slate-950 font-black uppercase bg-fuchsia-500 px-8 py-2 rounded-full">Answer</h3>
                      {activeQuestion.answerImage && <img src={activeQuestion.answerImage} alt="A" onError={(e) => e.target.style.display='none'} className="max-h-[30vh] object-contain rounded-xl shadow-lg border border-slate-700" />}
                      <p className="text-4xl md:text-5xl font-bold text-fuchsia-50">{activeQuestion.answer}</p>
                    </div>
                  )}
                </div>
              </div>

              <div className="p-8 flex flex-col items-center bg-gradient-to-t from-slate-950 to-transparent gap-6 pb-12">
                {questionStep === 'question' && (
                  <button onClick={() => setQuestionStep('answer')} className="group flex items-center gap-3 px-10 py-5 bg-cyan-500 hover:bg-cyan-400 text-slate-950 text-2xl font-black uppercase rounded-2xl shadow-xl transition-all hover:scale-105">Reveal Answer <ArrowRight className="group-hover:translate-x-1 transition-transform" /></button>
                )}
                {questionStep === 'answer' && (
                  <button onClick={() => setQuestionStep('scoring')} className="group flex items-center gap-3 px-10 py-5 bg-fuchsia-500 hover:bg-fuchsia-400 text-slate-950 text-2xl font-black uppercase rounded-2xl shadow-xl transition-all hover:scale-105">Proceed to Scoring <ArrowRight className="group-hover:translate-x-1 transition-transform" /></button>
                )}
                {questionStep === 'scoring' && (
                  <div className={`flex flex-col items-center gap-6 w-full max-w-4xl bg-slate-900/95 p-8 rounded-3xl border border-slate-700 shadow-2xl animate-in fade-in duration-500 ${isClosing ? 'pointer-events-none opacity-50' : ''}`}>
                    <span className="text-slate-400 font-black tracking-widest uppercase text-sm">Award or Deduct Points...</span>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                      {players.map(p => {
                        const theme = TEAM_THEMES[p.id];
                        return (
                          <div key={p.id} className={`relative flex items-center justify-between px-6 py-4 border-2 rounded-xl transition-all ${theme.border} ${theme.bg} ${theme.shadow}`}>
                            <span className={`text-xl font-black ${theme.text}`}>{p.name}</span>
                            <div className="flex gap-2">
                              <button onClick={() => handleTeamAnswer(p.id, true)} className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded-lg transition-colors">+{activeQuestion.points}</button>
                              <button onClick={() => handleTeamAnswer(p.id, false)} className="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-slate-50 font-bold rounded-lg transition-colors">-{activeQuestion.points}</button>
                            </div>

                            {/* Floating Text Container for Scoring Modal */}
                            <div className="absolute top-[-20px] right-12 flex justify-center pointer-events-none z-50">
                              {popups.filter(pop => pop.playerId === p.id).map(pop => (
                                <div key={pop.id} className={`absolute animate-float-up text-5xl font-black drop-shadow-2xl ${pop.amount > 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                  {pop.amount > 0 ? '+' : ''}{pop.amount}
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                      <button onClick={closeQuestion} className="col-span-1 md:col-span-2 mt-4 px-8 py-4 bg-slate-950 text-slate-500 border-2 border-slate-800 hover:bg-slate-800 hover:text-slate-300 rounded-xl font-bold transition-all text-lg">Nobody got it / Move On</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {showResetConfirm && (
            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-rose-500/50 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
                <h3 className="text-2xl font-black text-rose-500 mb-4">RESET QWIZ?</h3>
                <p className="text-slate-300 mb-8">Are you sure you want to reset the entire game? All scores will be lost.</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowResetConfirm(false)} className="px-6 py-3 bg-slate-800 text-slate-300 font-bold rounded-lg flex-1">Cancel</button>
                  <button onClick={confirmReset} className="px-6 py-3 bg-rose-600 text-white font-bold rounded-lg flex-1">Yes, Reset</button>
                </div>
              </div>
            </div>
          )}

          {alertMessage && (
            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-cyan-500/50 p-8 rounded-2xl max-w-sm w-full text-center">
                <p className="text-xl font-bold text-cyan-400 mb-8">{alertMessage}</p>
                <button onClick={() => setAlertMessage(null)} className="px-8 py-3 bg-cyan-600 text-slate-950 font-black rounded-lg">OK</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
